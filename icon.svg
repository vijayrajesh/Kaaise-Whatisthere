<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1e293b"/>
      <stop offset="1" stop-color="#0a1020"/>
    </linearGradient>
    <linearGradient id="cone" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#3b82f6" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#3b82f6" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0" stop-color="#3b82f6" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="512" height="512" fill="url(#bg)"/>
  <rect width="512" height="512" fill="url(#glow)"/>

  <!-- radar rings -->
  <g fill="none" stroke="#60a5fa">
    <circle cx="256" cy="256" r="176" stroke-width="6" stroke-opacity="0.22"/>
    <circle cx="256" cy="256" r="120" stroke-width="5" stroke-opacity="0.16"/>
    <circle cx="256" cy="256" r="64"  stroke-width="4" stroke-opacity="0.12"/>
  </g>

  <!-- field-of-view cone, fanning up from you -->
  <path d="M256 256 L150 100 L362 100 Z" fill="url(#cone)"
        stroke="#93c5fd" stroke-opacity="0.5" stroke-width="3" stroke-linejoin="round"/>

  <!-- places: bright inside the cone -->
  <g stroke="#1e3a8a" stroke-width="4">
    <circle cx="256" cy="148" r="16" fill="#bfdbfe"/>
    <circle cx="222" cy="198" r="13" fill="#93c5fd"/>
    <circle cx="300" cy="186" r="12" fill="#93c5fd"/>
  </g>
  <!-- places: dim, outside the cone -->
  <g fill="#64748b">
    <circle cx="150" cy="332" r="11"/>
    <circle cx="366" cy="316" r="11"/>
    <circle cx="300" cy="372" r="9"/>
  </g>

  <!-- you, at the centre -->
  <circle cx="256" cy="256" r="20" fill="#0a1020"/>
  <circle cx="256" cy="256" r="14" fill="#38bdf8" stroke="#e0f2fe" stroke-width="4"/>
</svg>
